<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our Members — Rotary District 3080</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --rotary-blue:#17458f;
    --rotary-azure:#0a5ec9;
    --rotary-gold:#f7a81b;
    --navy:#0b2545;
    --ink:#1f2a44;
    --muted:#64748b;
    --line:#e7ebf3;
    --bg:#eef2f8;
    --card:#ffffff;
    --shadow:0 18px 40px -18px rgba(15,40,90,.28);
    --shadow-sm:0 8px 22px -12px rgba(15,40,90,.25);
    --radius:22px;

    /* accent themes */
    --c-blue:#2563eb;   --c-blue-soft:#e8efff;
    --c-purple:#7c3aed; --c-purple-soft:#f1eaff;
    --c-teal:#0d9488;   --c-teal-soft:#e2f6f3;
    --c-pink:#db2777;   --c-pink-soft:#fdeaf3;
    --c-green:#16a34a;  --c-green-soft:#e7f7ec;
    --c-orange:#ea580c; --c-orange-soft:#fdeee3;
    --c-amber:#d97706;  --c-amber-soft:#fdf3e0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1280px;margin:0 auto;padding:0 22px}

  /* ============ HERO ============ */
  /* Text-free scenic background + HTML title/subtitle/logo overlay,
     so every element is independently sizable and crisp at any resolution. */
  .hero{
    position:relative;
    overflow:hidden;
    min-height:340px;
    padding:22px 0 96px;
    background:#cfe7f7 url("ChatGPT Image Jun 2, 2026, 02_11_55 PM.png") center bottom/cover no-repeat;
  }
  .hero::after{ /* legibility veil */
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.06) 38%,rgba(255,255,255,.42) 78%,rgba(255,255,255,.72) 100%);
  }
  .hero .wrap{position:relative;z-index:3}

  .brand{display:flex;align-items:center;gap:11px}
  .brand .brand-logo{
    height:clamp(74px,6.6vw,98px);width:auto;display:block;
    filter:drop-shadow(0 2px 7px rgba(6,16,54,.55)) drop-shadow(0 0 2px rgba(6,16,54,.45));
  }

  .hero-title{position:relative;text-align:center;margin-top:24px}
  /* feathered white patch behind the text — opaque core for contrast,
     soft transparent edges so it blends into the photo (no hard box). */
  .hero-title::before{
    content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(940px,94%);height:128%;z-index:-1;pointer-events:none;
    background:radial-gradient(ellipse 58% 56% at center,
      rgba(255,255,255,.94) 0%, rgba(255,255,255,.90) 42%,
      rgba(255,255,255,.62) 66%, rgba(255,255,255,0) 86%);
    filter:blur(6px);
  }
  .hero-title h1{
    font-family:"Cinzel","Playfair Display",Georgia,serif;
    font-weight:900;
    font-size:clamp(30px,4.2vw,60px);
    color:#0B1F6A;
    letter-spacing:1px;
    text-shadow:0 1px 1px rgba(255,255,255,.65), 0 0 16px rgba(255,255,255,.55);
  }
  .divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0 16px}
  .divider .ln{height:2px;width:74px;background:linear-gradient(90deg,transparent,#F2A100)}
  .divider .ln.r{background:linear-gradient(90deg,#F2A100,transparent)}
  .divider .dot{width:9px;height:9px;border-radius:50%;background:#F2A100;box-shadow:0 0 0 4px rgba(242,161,0,.22)}
  .hero-title p{
    font-family:"Playfair Display",Georgia,serif;
    font-weight:600;
    color:#0B1F6A;
    font-size:clamp(17px,1.9vw,28px);
    letter-spacing:.2px;
    text-shadow:0 1px 2px rgba(255,255,255,.7);
  }

  /* ============ SEARCH BAR ============ */
  .searchbar{
    position:relative;
    z-index:4;
    margin:-58px auto 0;
    max-width:1120px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:14px;
    display:grid;
    grid-template-columns:1fr 230px 250px;
    gap:12px;
  }
  /* members search bar: extra column for the back button */
  .searchbar.members-bar{grid-template-columns:1fr 200px 220px auto}
  .searchbar.members-bar .backbtn{margin:0;height:100%}
  .field{
    display:flex;align-items:center;gap:10px;
    background:#f6f8fc;border:1px solid var(--line);
    border-radius:13px;padding:0 14px;height:54px;
    transition:border-color .15s,box-shadow .15s,background .15s;
  }
  .field:focus-within{border-color:var(--rotary-azure);background:#fff;box-shadow:0 0 0 4px rgba(10,94,201,.12)}
  .field svg{flex:none;color:var(--muted)}
  .field input{
    border:0;outline:0;background:transparent;width:100%;
    font:inherit;font-size:15px;color:var(--ink);
  }
  .field input::placeholder{color:#9aa6bb}
  .mic{flex:none;background:none;border:0;cursor:pointer;color:var(--rotary-azure);display:flex;padding:4px;border-radius:8px}
  .mic:hover{background:rgba(10,94,201,.10)}
  .select-field{position:relative}
  .select-field select{
    appearance:none;border:0;outline:0;background:transparent;
    font:inherit;font-size:15px;color:var(--ink);width:100%;cursor:pointer;
    padding-right:18px;
  }
  .select-field .chev{margin-left:auto;color:var(--muted);pointer-events:none}
  .field .lead.club{color:var(--rotary-azure)}
  .field .lead.tag{color:var(--c-purple)}

  /* ============ RESULTS COUNT ============ */
  .count{
    display:flex;align-items:center;justify-content:center;gap:14px;
    margin:26px 0 22px;
  }
  .count .orn{display:flex;align-items:center;gap:6px;color:var(--rotary-gold)}
  .count .orn .bar{height:2px;width:46px;background:linear-gradient(90deg,transparent,var(--rotary-gold))}
  .count .orn.r .bar{background:linear-gradient(90deg,var(--rotary-gold),transparent)}
  .count .label{font-size:18px;font-weight:700;color:var(--navy)}
  .count .label b{color:var(--rotary-azure)}

  /* ============ GRID ============ */
  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:22px;
    padding-bottom:10px;
  }

  .card{
    position:relative;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px 20px 20px;
    box-shadow:var(--shadow-sm);
    overflow:hidden;
    isolation:isolate;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
  /* gradient accent stripe across the top edge */
  .card::before{
    content:"";position:absolute;left:0;right:0;top:0;height:6px;z-index:3;
    background:linear-gradient(90deg,var(--accent),var(--accent-soft));
  }

  /* decorative layered wave bottom-left */
  .card .wave{
    position:absolute;left:0;bottom:0;width:70%;height:96px;z-index:0;pointer-events:none;
    color:var(--accent);
  }
  /* dotted triangle pattern bottom-right */
  .card .dots{
    position:absolute;right:16px;bottom:14px;z-index:0;opacity:.5;color:var(--accent);pointer-events:none;
  }
  /* gearwheel watermark top-right */
  .card .watermark{
    position:absolute;right:14px;top:14px;width:34px;height:34px;opacity:.10;color:var(--accent);z-index:0;
  }

  .card .head{display:flex;align-items:center;gap:14px;position:relative;z-index:2;margin-bottom:15px}
  .avatar{
    width:72px;height:72px;border-radius:50%;flex:none;object-fit:cover;
    border:2px solid #fff;box-shadow:0 0 0 3px var(--accent-soft);
    background:var(--accent-soft);
  }
  .avatar.fallback{
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);font-weight:800;font-size:22px;
  }
  .card .who h3{font-size:18px;font-weight:800;color:var(--navy);line-height:1.25}
  .card .who .club{font-size:13.5px;color:var(--navy);margin-top:4px;font-weight:700}

  .contact{display:flex;flex-direction:column;gap:11px;position:relative;z-index:2}
  .contact .row{display:flex;align-items:center;gap:11px;font-size:14.5px;font-weight:500;color:#334155}
  .contact .row .ic{
    width:18px;height:18px;flex:none;
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);
  }
  .contact .row .ic svg{width:17px;height:17px}
  .contact .row a{color:#334155;text-decoration:none}
  .contact .row a:hover{color:var(--accent);text-decoration:underline}
  .contact .row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* empty state */
  .empty{
    grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--muted);
  }
  .empty svg{color:#c3cee0;margin-bottom:14px}
  .empty h3{color:var(--navy);font-size:22px;margin-bottom:6px;font-family:"Playfair Display",serif}

  /* ============ FOOTER ============ */
  footer{background:#00155e;color:#dbe4f3}
  footer .wrap{display:flex;align-items:center;gap:22px;padding:18px 28px;flex-wrap:wrap}
  footer .footer-logo{height:100px;width:auto;display:block;flex:none}
  footer .motto{font-style:italic;color:#cdd9ef;font-size:14.5px;border-left:1px solid #2a4a82;padding-left:22px}
  footer .copy{margin-left:auto;font-size:12.5px;color:#9fb1d4;white-space:nowrap}

  /* ============ RESPONSIVE ============ */
  @media (max-width:1080px){
    .grid{grid-template-columns:repeat(3,1fr)}
    .searchbar{grid-template-columns:1fr 1fr;}
    .searchbar.members-bar{grid-template-columns:1fr 1fr}
    .searchbar .search-main{grid-column:1/-1}
  }
  @media (max-width:760px){
    .grid{grid-template-columns:repeat(2,1fr)}
    .searchbar{grid-template-columns:1fr;margin-top:-40px}
    .searchbar.members-bar{grid-template-columns:1fr}
    footer .wrap{flex-direction:column;align-items:flex-start;gap:16px}
    footer .motto{border-left:0;padding-left:0}
    footer .copy{margin-left:0}
  }
  @media (max-width:520px){
    .grid{grid-template-columns:1fr}
  }

  /* ============ STATS ROW (vocations view) ============ */
  .stats{display:flex;align-items:center;justify-content:center;gap:10px;margin:26px 0 24px;flex-wrap:wrap}
  .stats .orn{display:flex;align-items:center;gap:6px;color:var(--rotary-gold)}
  .stats .orn .bar{height:2px;width:40px;background:linear-gradient(90deg,transparent,var(--rotary-gold))}
  .stats .orn.r .bar{background:linear-gradient(90deg,var(--rotary-gold),transparent)}
  .stat{display:flex;align-items:center;gap:12px;padding:0 30px}
  .stat .sicon{width:30px;height:30px;flex:none}
  .stat.mem .sicon{color:var(--rotary-azure)}
  .stat.voc .sicon{color:var(--c-purple)}
  .stat .txt{display:flex;align-items:baseline;gap:7px}
  .stat .num{font-size:24px;font-weight:800;color:var(--navy);line-height:1}
  .stat.mem .num{color:var(--rotary-azure)}
  .stat.voc .num{color:var(--c-purple)}
  .stat .lbl{font-size:14px;font-weight:600;color:var(--muted)}
  .vline{width:1px;height:36px;background:var(--line)}

  /* ============ VOCATION CARDS ============ */
  .ccard{
    display:flex;align-items:center;gap:15px;
    background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:16px 18px;box-shadow:var(--shadow-sm);cursor:pointer;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    text-align:left;width:100%;font:inherit;
  }
  .ccard:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:color-mix(in srgb,var(--accent) 40%,#fff)}
  .ccard:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .ccard .cicon{
    width:54px;height:54px;border-radius:15px;flex:none;
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);background:linear-gradient(135deg,var(--accent-soft),#fff);
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 14%,#fff);
  }
  .ccard .cmeta{min-width:0;display:flex;flex-direction:column}
  .ccard .cmeta .nm{font-size:15.5px;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ccard .cmeta .cnt{font-size:13px;color:var(--muted);margin-top:4px}
  .ccard .cmeta .cnt b{color:var(--accent);font-weight:800}
  .ccard .cgo{margin-left:auto;color:#c3cee0;flex:none;transition:transform .16s,color .16s}
  .ccard:hover .cgo{color:var(--accent);transform:translateX(3px)}

  /* ============ BACK BUTTON ============ */
  .backbtn{
    display:inline-flex;align-items:center;gap:8px;cursor:pointer;
    border:1px solid var(--line);background:#fff;border-radius:11px;
    padding:9px 16px;font:inherit;font-weight:600;font-size:14px;color:var(--rotary-blue);
    box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s;
  }
  .backbtn:hover{transform:translateX(-3px);box-shadow:var(--shadow)}

  [hidden]{display:none !important}
</style>
</head>
<body class="is-class">

  <!-- ============ HERO ============ -->
  <header class="hero">
    <div class="wrap">
      <div class="brand">
        <img class="brand-logo" src="logo_wg_t.png" alt="Rotary District 3080" />
      </div>

      <div class="hero-title">
        <h1 id="heroTitle">Vocational Directory</h1>
        <div class="divider" aria-hidden="true"><span class="ln"></span><span class="dot"></span><span class="ln r"></span></div>
        <p id="heroSub">Explore professional vocations represented across Rotary District 3080</p>
      </div>
    </div>
  </header>

  <!-- ======================================================= -->
  <!-- ============ VIEW 1 : VOCATIONS ================= -->
  <!-- ======================================================= -->
  <section id="viewClass">
    <div class="wrap">
      <div class="searchbar" role="search">
        <label class="field search-main">
          <svg class="lead" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="cq" type="search" autocomplete="off" placeholder="Search vocation name…" aria-label="Search vocations" />
          <button class="mic" id="cMicBtn" type="button" aria-label="Voice search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 17v4"/><path d="M8 21h8"/></svg>
          </button>
        </label>

        <label class="field select-field">
          <svg class="lead club" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 9h.01M9 13h.01M9 17h.01M15 9h.01M15 13h.01M15 17h.01"/></svg>
          <select id="cClubFilter" aria-label="Filter by club"><option value="">All Clubs</option></select>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </label>

        <label class="field select-field">
          <svg class="lead" style="color:var(--rotary-azure)" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/></svg>
          <select id="cCountFilter" aria-label="Filter by member count">
            <option value="">All Member Counts</option>
            <option value="lt30">Fewer than 30 members</option>
            <option value="30-40">30 – 40 members</option>
            <option value="gt40">More than 40 members</option>
          </select>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </label>
      </div>
    </div>

    <div class="wrap">
      <div class="stats">
        <span class="orn"><span class="bar"></span>◆</span>
        <div class="stat mem">
          <svg class="sicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="txt"><span class="num" id="memTotal">0</span><span class="lbl" id="memLbl">Members</span></span>
        </div>
        <span class="vline"></span>
        <div class="stat voc">
          <svg class="sicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>
          <span class="txt"><span class="num" id="vocTotal">0</span><span class="lbl" id="vocLbl">Vocations</span></span>
        </div>
        <span class="orn r">◆<span class="bar"></span></span>
      </div>
    </div>

    <main class="wrap">
      <section class="grid" id="cGrid" aria-live="polite" style="margin-bottom:50px"></section>
    </main>
  </section>

  <!-- ======================================================= -->
  <!-- ============ VIEW 2 : MEMBERS ========================= -->
  <!-- ======================================================= -->
  <section id="viewMembers" hidden>
    <div class="wrap">
      <div class="searchbar members-bar" role="search" style="margin-top:14px">
        <label class="field search-main">
          <svg class="lead" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="q" type="search" autocomplete="off"
                 placeholder="Search by name, club, vocation, email or mobile…"
                 aria-label="Search members" />
          <button class="mic" id="micBtn" type="button" aria-label="Voice search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 17v4"/><path d="M8 21h8"/></svg>
          </button>
        </label>

        <label class="field select-field">
          <svg class="lead club" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 9h.01M9 13h.01M9 17h.01M15 9h.01M15 13h.01M15 17h.01"/></svg>
          <select id="clubFilter" aria-label="Filter by club"><option value="">All Clubs</option></select>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </label>

        <label class="field select-field">
          <svg class="lead tag" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>
          <select id="vocationFilter" aria-label="Filter by vocation"><option value="">All Vocations</option></select>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </label>

        <button class="backbtn" id="backBtn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          All Vocations
        </button>
      </div>
    </div>

    <div class="wrap">
      <div class="count">
        <span class="orn"><span class="bar"></span>◆</span>
        <span class="label"><b id="countNum">0</b> <span id="countLbl">Members</span></span>
        <span class="orn r">◆<span class="bar"></span></span>
      </div>
    </div>

    <main class="wrap">
      <section class="grid" id="grid" aria-live="polite" style="margin-bottom:40px"></section>
    </main>
  </section>

  <!-- ============ FOOTER ============ -->

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

const pick = arr => arr[Math.floor(rnd()*arr.length)];

const firstM=["Amit","Rajesh","Sandeep","Vikram","Arjun","Rohan","Suresh","Anil","Manish","Deepak","Karthik","Nikhil","Rahul","Vivek","Sanjay","Aditya","Harish","Pranav","Gaurav","Mohit"];

const accents=["blue","purple","teal","pink","green","orange","amber"];

const MEMBERS = [];

  const female = rnd()<0.5;
  const fn = female?pick(firstF):pick(firstM);
  const ln = pick(last);
  const name = `${fn} ${ln}`;
  const club = pick(clubs);
  const vocation = pick(VOCATIONS).name;
  const phone = `+91 ${90+Math.floor(rnd()*10)}${Math.floor(10000+rnd()*89999)} ${Math.floor(10000+rnd()*89999)}`.slice(0,17);
  const email = `${fn}.${ln}`.toLowerCase()+`@example.com`;
  const dob = `${Math.floor(1+rnd()*28)} ${pick(months)} ${1965+Math.floor(rnd()*40)}`;
  MEMBERS.push({
    name, club, vocation, phone, email, dob, female,
    initials:(fn[0]+ln[0]).toUpperCase(),
    accent:accents[i%accents.length],
    photo:`https://i.pravatar.cc/120?img=${1+(i%70)}`
  });
}

function vocationCount(name,club){
  if(!club) return totalByVocation[name]||0;
  let n=0; for(const m of MEMBERS) if(m.vocation===name && m.club===club) n++;
  return n;
}

function applyVocations(){
  const q=cqInput.value.trim().toLowerCase();
  const club=cClubSel.value, bucket=cCountSel.value;
  let memSum=0; const list=[];
  for(const c of VOCATIONS){
    const count=vocationCount(c.name,club);
    if(club && count===0) continue;
    if(q && !c.name.toLowerCase().includes(q)) continue;
    if(bucket==='lt30' && !(count<30)) continue;
    if(bucket==='30-40' && !(count>=30&&count<=40)) continue;
    if(bucket==='gt40' && !(count>40)) continue;
    list.push({...c,count}); memSum+=count;
  }
  memTotalEl.textContent=fmt(memSum);
  vocTotalEl.textContent=fmt(list.length);
  document.getElementById('memLbl').textContent = memSum===1 ? 'Member' : 'Members';
  document.getElementById('vocLbl').textContent = list.length===1 ? 'Vocation' : 'Vocations';
  cGrid.innerHTML = list.length ? list.map(ccardHTML).join('')
    : emptyHTML('No vocations found','Try a different name, club or member count.');
}

cGrid.addEventListener('click',e=>{
  const b=e.target.closest('.ccard');
  if(b) location.hash='c='+encodeURIComponent(b.dataset.vocation);
});

let ct;
cqInput.addEventListener('input',()=>{clearTimeout(ct);ct=setTimeout(applyVocations,180);});
cClubSel.addEventListener('change',applyVocations);
cCountSel.addEventListener('change',applyVocations);

/* ============================================================
   View 2 — members grid
   ============================================================ */
const grid=document.getElementById('grid');
const countNum=document.getElementById('countNum');
const qInput=document.getElementById('q');
let filtered=MEMBERS;

function applyFilters(){
  const q=qInput.value.trim().toLowerCase();
  const club=clubSel.value, vocation=vocationSel.value;
  filtered=MEMBERS.filter(m=>{
    if(club && m.club!==club) return false;
    if(vocation && m.vocation!==vocation) return false;
    if(q){
      const hay=`${m.name} ${m.club} ${m.vocation} ${m.email} ${m.phone}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  countNum.textContent=fmt(filtered.length);
  document.getElementById('countLbl').textContent = filtered.length===1 ? 'Member' : 'Members';
  grid.innerHTML='';
  if(filtered.length===0){
    grid.innerHTML=emptyHTML('No members found','Try a different name, club or vocation.');
    return;
  }
  grid.insertAdjacentHTML('beforeend',filtered.map(cardHTML).join(''));
}

let t;
qInput.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(applyFilters,200);});
clubSel.addEventListener('change',applyFilters);
vocationSel.addEventListener('change',()=>{
  applyFilters();
  heroSub.textContent = vocationSel.value ? `Members in the ${vocationSel.value} vocation`
                                       : 'Explore and connect with Rotary members from District 3080';
});

/* voice search (both views) */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function wireMic(btnId,input,cb){
  document.getElementById(btnId).addEventListener('click',()=>{
    if(!SR){alert('Voice search is not supported in this browser. Please type your query.');return;}
    const r=new SR();r.lang='en-IN';r.interimResults=false;
    r.onresult=e=>{input.value=e.results[0][0].transcript;cb();};
    r.start();
  });
}
wireMic('micBtn',qInput,applyFilters);
wireMic('cMicBtn',cqInput,applyVocations);

/* ============================================================
   Routing : #  -> vocations ,  #c=<name> -> members
   ============================================================ */
const heroTitle=document.getElementById('heroTitle');
const heroSub=document.getElementById('heroSub');
const viewClass=document.getElementById('viewClass');
const viewMembers=document.getElementById('viewMembers');

function showClass(){
  document.body.className='is-class';
  heroTitle.textContent='Vocational Directory';
  heroSub.textContent='Explore professional vocations represented across Rotary District 3080';
  viewMembers.hidden=true; viewClass.hidden=false;
  window.scrollTo({top:0});
}
function showMembers(vocationName){
  document.body.className='is-members';
  heroTitle.textContent='Our Members';
  heroSub.textContent = vocationName ? `Members in the ${vocationName} vocation`
                                : 'Explore and connect with Rotary members from District 3080';
  vocationSel.value = vocationName && VOCATIONS.some(c=>c.name===vocationName) ? vocationName : '';
  clubSel.value=''; qInput.value='';
  viewClass.hidden=true; viewMembers.hidden=false;
  applyFilters();
  window.scrollTo({top:0});
}
function route(){
  const h=decodeURIComponent(location.hash.replace(/^#/,''));
  if(h.startsWith('c=')) showMembers(h.slice(2));
  else showClass();
}
document.getElementById('backBtn').addEventListener('click',()=>{location.hash='';});
window.addEventListener('hashchange',route);

/* init */
applyVocations();
route();
</script>
</body>
</html>
